<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sakura Sushi</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght=0,400..900;1,400..900&family=Poppins:wght=400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <header class="header">
            <div class="logo-area">
                <img src="logo-saKura.png" alt="Logo Sakura Sushi" class="logo-img">
                <h1 class="brand-name">Sakura Sushi</h1>
            </div>
        </header>

        <main class="main-content">
            
            <div class="card-image-container">
                <img src="img.sushi.jpg" alt="Sakura Sushi Premium" class="hero-image">
                <div class="buttons-overlay">
                    <button class="btn">CADASTRO</button>
                    <button class="btn">CARDÁPIO</button>
                    <button class="btn">COMBOS</button>
                </div>
            </div>

            <section class="banner-split-section">
                <div class="banner-image-side">
                    <img src="banner-sushi.png" alt="Prato de Sushi Sakura" class="side-img">
                </div>
                <div class="banner-text-side">
                    <h2>O melhor sushi da Região!</h2>
                    <p class="quote">"Não deixe para amanhã o sushi que você pode comer hoje!"</p>
                </div>
            </section>

            <section class="page-image-section">
                <img src="img1.png" alt="Cardápio Sakura Sushi Parte 1" class="full-page-img">
            </section>
            
            <section class="page-image-section">
                <img src="img2.png" alt="Cardápio Sakura Sushi Parte 2" class="full-page-img">
            </section>
            
            <section class="page-image-section">
                <img src="img3.png" alt="Combos Especiais Sakura Sushi" class="full-page-img">
            </section>
            
            <section class="page-image-section">
                <img src="img4.png" alt="Mais opções Sakura Sushi" class="full-page-img">
            </section>
            
            <section class="page-image-section">
                <img src="img5.png" alt="Cardápio Sakura Sushi Opções 5" class="full-page-img">
            </section>
            
            <section class="page-image-section">
                <img src="img6.png" alt="Cardápio Sakura Sushi Opções 6" class="full-page-img">
            </section>
            
            <section class="page-image-section">
                <img src="img7.png" alt="Cardápio Sakura Sushi Opções 7" class="full-page-img">
            </section>
            
            <section class="page-image-section">
                <img src="img8.png" alt="Cardápio Sakura Sushi Opções 8" class="full-page-img">
            </section>
            
            <section class="page-image-section">
                <img src="img9.png" alt="Cardápio Sakura Sushi Opções 9" class="full-page-img">
            </section>
            
            <section class="page-image-section">
                <img src="img10.png" alt="Cardápio Sakura Sushi Opções 10" class="full-page-img">
            </section>

            <section class="pedidos-section">
                <h2>Aceitamos pedidos por:</h2>
                <div class="pedidos-links">
                    <p><strong>Whatsapp:</strong> (12) 3456-1890</p>
                    <p><strong>Site:</strong> www.sakurasushi.com.br</p>
                    <p><strong>Telefone:</strong> (12) 3456-1890</p>
                </div>
                <div class="delivery-container">
                    <p>Entrega por:</p>
                    <span class="delivery-badge">Delivery</span>
                </div>
            </section>


        </main>
    </div>

</body>
</html>
